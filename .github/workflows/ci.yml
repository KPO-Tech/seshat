name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        run: go build ./cmd/cli/...

      - name: Build gRPC server
        run: go build ./cmd/grpc/...

      - name: Build all packages
        run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with race detector
        run: go test -race ./... -timeout 300s

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m

  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    steps:
      - name: Enforce PR branch flow
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && \
                "${{ github.base_ref }}" == "main" && \
                "${{ github.head_ref }}" != "dev" ]]; then
            echo "Pull requests targeting main must come from dev."
            echo "Current head branch: ${{ github.head_ref }}"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "pull_request" && \
                "${{ github.base_ref }}" == "dev" ]]; then
            case "${{ github.head_ref }}" in
              feat/*|fix/*|docs/*|refactor/*|test/*|chore/*|perf/*|ci/*)
                ;;
              *)
                echo "Pull requests targeting dev must come from a typed topic branch."
                echo "Allowed prefixes: feat/, fix/, docs/, refactor/, test/, chore/, perf/, ci/"
                echo "Current head branch: ${{ github.head_ref }}"
                exit 1
                ;;
            esac
          fi

          echo "Branch policy check passed."

  # gate is the single required status check for branch protection.
  # Adding new jobs above automatically blocks the merge without
  # touching the branch protection rules again.
  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs: [build, test, lint, branch-policy]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.build.result }}" != "success" || \
                "${{ needs.test.result }}"  != "success" || \
                "${{ needs.lint.result }}"  != "success" || \
                "${{ needs.branch-policy.result }}" != "success" ]]; then
            echo "One or more required checks failed."
            echo "  build: ${{ needs.build.result }}"
            echo "  test:  ${{ needs.test.result }}"
            echo "  lint:  ${{ needs.lint.result }}"
            echo "  branch-policy: ${{ needs.branch-policy.result }}"
            exit 1
          fi
          echo "All checks passed."
