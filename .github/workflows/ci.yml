name: CI

on:
  push:
    branches: ["main", "dev"]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: ["main", "dev"]
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build CLI
        run: go build ./cmd/cli/...

      - name: Build gRPC server
        run: go build ./cmd/grpc/...

      - name: Build all packages
        run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with race detector
        run: go test -race ./... -timeout 300s

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m

  # gate is the single required status check for branch protection.
  # Adding new jobs above automatically blocks the merge without
  # touching the branch protection rules again.
  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs: [build, test, lint]
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ needs.build.result }}" != "success" || \
                "${{ needs.test.result }}"  != "success" || \
                "${{ needs.lint.result }}"  != "success" ]]; then
            echo "One or more required checks failed."
            echo "  build: ${{ needs.build.result }}"
            echo "  test:  ${{ needs.test.result }}"
            echo "  lint:  ${{ needs.lint.result }}"
            exit 1
          fi
          echo "All checks passed."
